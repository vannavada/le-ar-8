<svg width="520" height="560" viewBox="0 0 520 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="le-ar-8 human element logo">
  <!-- Concept 1: The Human Element — le-ar-8
       Mark: a figure-8 / infinity formed above a stack of horizontal bars (the OSI layers).
       The 8 is "Layer 8" — the human layer sitting atop the machine stack.
       Geometric interpretation of the original ribbon concept.
       Palette: Deep Slate #2F4F4F, Muted Magenta #D81B60, Electric Cyan #00E5FF,
       Tech Blue #1976D2, Light Gray #F5F5F5. -->
  <rect width="520" height="560" fill="none"/>

  <!-- FIGURE-8 MARK (the human layer) -->
  <!-- upper loop -->
  <circle cx="260" cy="150" r="78" fill="none" stroke="#D81B60" stroke-width="34"/>
  <!-- lower loop, overlapping, cyan -->
  <circle cx="260" cy="262" r="78" fill="none" stroke="#00E5FF" stroke-width="34"/>
  <!-- crossing accent where the loops meet -->
  <circle cx="260" cy="206" r="17" fill="#2F4F4F"/>

  <!-- THE STACK (OSI layers beneath the human) -->
  <g>
    <rect x="150" y="360" width="220" height="16" rx="4" fill="#2F4F4F"/>
    <rect x="150" y="384" width="220" height="16" rx="4" fill="#D81B60"/>
    <rect x="150" y="408" width="220" height="16" rx="4" fill="#00E5FF"/>
    <rect x="150" y="432" width="220" height="16" rx="4" fill="#1976D2"/>
    <rect x="150" y="456" width="220" height="16" rx="4" fill="#2F4F4F"/>
  </g>

  <!-- WORDMARK -->
  <text x="260" y="520" text-anchor="middle"
        font-family="Montserrat,'Inter',system-ui,sans-serif"
        font-weight="800" font-size="58" letter-spacing="1" fill="#2F4F4F">le-ar-8</text>
  <text x="260" y="548" text-anchor="middle"
        font-family="Montserrat,'Inter',system-ui,sans-serif"
        font-weight="600" font-size="18" letter-spacing="4" fill="#1976D2">.com</text>
</svg>
